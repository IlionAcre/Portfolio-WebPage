name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.25"

      - name: Install dependencies (including dev group)
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build the Dockerfile
        run: docker build -t portfolio-webpage:ci .
